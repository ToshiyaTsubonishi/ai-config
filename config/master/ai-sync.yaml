version: "1.0.0"

# ---------------------------------------------------------------------------
# Tool catalog configuration
# ---------------------------------------------------------------------------
# This file defines the managed tools that are indexed for dynamic selection.
# The ai-config-selector MCP server searches these via the .index/ registry.
# Only ai-config-selector itself is registered as an active MCP server.

targets:
  codex:
    path_profiles:
      windows:
        mcp_file: "${USERPROFILE}\\.codex\\config.toml"
      darwin:
        mcp_file: "${HOME}/.codex/config.toml"

  antigravity:
    path_profiles:
      windows:
        mcp_file: "${USERPROFILE}\\.gemini\\antigravity\\mcp_config.json"
      darwin:
        mcp_file: "${HOME}/.gemini/antigravity/mcp_config.json"

  gemini_cli:
    path_profiles:
      windows:
        mcp_file: "${USERPROFILE}\\.gemini\\settings.json"
      darwin:
        mcp_file: "${HOME}/.gemini/settings.json"

# ---------------------------------------------------------------------------
# Managed MCP servers — indexed for dynamic selection
# ---------------------------------------------------------------------------
mcp_servers:
  eslint:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@eslint/mcp@latest"]
    env: {}
    timeout_ms: 20000

  filesystem:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "${WORKSPACE_ROOT}"]
    env: {}
    timeout_ms: 20000

  remotion-documentation:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@remotion/mcp@latest"]
    env: {}
    timeout_ms: 20000

  reinfo:
    transport: "stdio"
    command: "npx"
    args: ["-y", "mcp-remote", "https://mcp.n-3.ai/mcp?tools=get-time,reinfolib-real-estate-price,reinfolib-city-list"]
    env: {}
    timeout_ms: 20000

  kkj:
    transport: "stdio"
    command: "npx"
    args: ["-y", "mcp-remote", "https://mcp.n-3.ai/mcp?tools=kkj-search"]
    env: {}
    timeout_ms: 20000

  e-stat:
    transport: "stdio"
    command: "npx"
    args: ["-y", "mcp-remote", "https://mcp.n-3.ai/mcp?tools=e-stat-get-stats-list,e-stat-get-meta-info,e-stat-get-data-catalog"]
    env: {}
    timeout_ms: 20000

  inference-proxy-mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "mcp-remote", "http://localhost:{{PORT_INFERENCE_PROXY_MCP}}/mcp"]
    env: {}
    timeout_ms: 20000

  paper-search-mcp:
    transport: "stdio"
    command: "bash"
    args:
      - "-lc"
      - "uvx paper-search-mcp"
    env:
      SEMANTIC_SCHOLAR_API_KEY: ""
    timeout_ms: 30000

  jupyter-mcp-server:
    transport: "stdio"
    command: "bash"
    args:
      - "-lc"
      - "uvx jupyter-mcp-server@latest"
    env:
      JUPYTER_URL: ""
      JUPYTER_TOKEN: ""
    timeout_ms: 30000

  notion-mcp:
    transport: "stdio"
    command: "bash"
    args:
      - "-lc"
      - 'npx -y mcp-remote --header "Authorization: Bearer ${NOTION_API_KEY}" https://mcp.notion.com/mcp'
    env:
      NOTION_API_KEY: ""
    timeout_ms: 30000

  raindrop:
    transport: "stdio"
    command: "bash"
    args:
      - "-lc"
      - 'if [ -n "${RAINDROP_API_TOKEN}" ]; then npx -y mcp-remote --header "Authorization: Bearer ${RAINDROP_API_TOKEN}" https://api.raindrop.io/rest/v2/ai/mcp; else npx -y mcp-remote https://api.raindrop.io/rest/v2/ai/mcp; fi'
    env:
      RAINDROP_API_TOKEN: ""
    timeout_ms: 30000

  microsoft-learn-mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "mcp-remote", "https://learn.microsoft.com/api/mcp"]
    env: {}
    timeout_ms: 30000

  google-knowledge-mcp:
    transport: "stdio"
    command: "bash"
    args:
      - "-lc"
      - 'npx -y mcp-remote --header "X-Goog-Api-Key: ${GOOGLE_API_KEY}" --header "X-Goog-User-Project: ${PROJECT_ID}" https://knowledge-mcp.global.api.dev/mcp'
    env:
      GOOGLE_API_KEY: ""
      PROJECT_ID: ""
    timeout_ms: 30000

  mlit-geospatial-mcp:
    transport: "stdio"
    command: "python"
    args:
      - "${MLIT_GEOSPATIAL_MCP_DIR}/src/server.py"
    env:
      LIBRARY_API_KEY: ""
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "WARNING"
    timeout_ms: 30000
    # 不動産情報ライブラリAPIを統合呼び出し（国土交通省）
    # 利用前に https://www.reinfolib.mlit.go.jp/api/request/ でAPIキーを申請し
    # MLIT_GEOSPATIAL_MCP_DIR にリポジトリのパスを設定してください。
    # https://github.com/chirikuuka/mlit-geospatial-mcp

  tax-law-mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "tax-law-mcp"]
    env: {}
    timeout_ms: 30000
    # 日本の税法・通達・裁決事例を取得するMCPサーバー
    # e-Gov法令API v2 / 国税庁サイト / 国税不服審判所
    # https://github.com/kentaroajisaka/tax-law-mcp

  labor-law-mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "labor-law-mcp"]
    env: {}
    timeout_ms: 30000
    # 日本の労働・社会保険法令と行政通達を取得するMCPサーバー
    # e-Gov法令API v2 / 厚労省法令等DB / 安全衛生情報センター（JAISH）
    # https://github.com/kentaroajisaka/labor-law-mcp

  genai-toolbox:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@toolbox-sdk/server", "--prebuilt=${TOOLBOX_DATABASE}"]
    env:
      TOOLBOX_DATABASE: "postgres"
    timeout_ms: 30000
    # MCP Toolbox for Databases (googleapis/genai-toolbox)
    # AIエージェントとデータベースを接続するオープンソースMCPサーバー
    # TOOLBOX_DATABASE に接続先DBを指定 (postgres / mysql / bigquery / alloydb 等)
    # 接続用の環境変数は DB の種類に応じて設定:
    #   PostgreSQL: POSTGRES_HOST, POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    #   BigQuery:   GOOGLE_CLOUD_PROJECT, BQ_DATASET
    # 詳細: https://googleapis.github.io/genai-toolbox/reference/prebuilt-tools/
    # https://github.com/googleapis/genai-toolbox

# ---------------------------------------------------------------------------
# Skill sets — indexed for dynamic selection
# ---------------------------------------------------------------------------
skill_sets:
  external:
    - "skills/external/*"
  custom:
    - "skills/custom/*"
  shared:
    - "skills/shared/*"

# ---------------------------------------------------------------------------
# LLM configuration for the orchestrator
# ---------------------------------------------------------------------------
llm:
  model: "gemini-flash-latest"
  env_var: "GEMINI_MODEL"
  temperature: 0.1
