version: "1.0.0"

defaults:
  dry_run: false
  backup: true
  conflict_policy: prompt
  excluded_toolchains:
    - anthropic

targets:
  codex:
    enabled: true
    path_profiles:
      windows:
        root_dir: "${USERPROFILE}\\.codex"
        config_file: "${USERPROFILE}\\.codex\\config.toml"
        mcp_file: "${USERPROFILE}\\.codex\\config.toml"
        skills_dir: "${USERPROFILE}\\.codex\\skills"
        fallback_skills_dirs:
          - "${USERPROFILE}\\.agents\\skills"
      darwin:
        root_dir: "${HOME}/.codex"
        config_file: "${HOME}/.codex/config.toml"
        mcp_file: "${HOME}/.codex/config.toml"
        skills_dir: "${HOME}/.codex/skills"
        fallback_skills_dirs:
          - "${HOME}/.agents/skills"
    templates:
      config_template: "config/targets/codex/config.toml.tmpl"
      mcp_template: "config/targets/codex/config.toml.tmpl"
    override_env:
      config_file: "CODEX_CONFIG_PATH"
      mcp_file: "CODEX_CONFIG_PATH"
      skills_dir: "CODEX_SKILLS_PATH"
    sync:
      mcp_mode: "replace"
      skills_mode: "overlay"
      skill_layers: ["shared", "target"]

  antigravity:
    enabled: true
    path_profiles:
      windows:
        root_dir: "${USERPROFILE}\\.gemini\\antigravity"
        mcp_file: "${USERPROFILE}\\.gemini\\antigravity\\mcp_config.json"
        skills_dir: "${USERPROFILE}\\.gemini\\antigravity\\skills"
      darwin:
        root_dir: "${HOME}/.gemini/antigravity"
        mcp_file: "${HOME}/.gemini/antigravity/mcp_config.json"
        skills_dir: "${HOME}/.gemini/antigravity/skills"
    templates:
      mcp_template: "config/targets/antigravity/mcp_config.json.tmpl"
    override_env:
      mcp_file: "ANTIGRAVITY_MCP_CONFIG_PATH"
      skills_dir: "ANTIGRAVITY_SKILLS_PATH"
    sync:
      mcp_mode: "replace"
      skills_mode: "overlay"
      skill_layers: ["shared", "target"]

  gemini_cli:
    enabled: true
    path_profiles:
      windows:
        root_dir: "${USERPROFILE}\\.gemini"
        config_file: "${USERPROFILE}\\.gemini\\settings.json"
        mcp_file: "${USERPROFILE}\\.gemini\\settings.json"
        skills_dir: "${USERPROFILE}\\.gemini\\skills"
      darwin:
        root_dir: "${HOME}/.gemini"
        config_file: "${HOME}/.gemini/settings.json"
        mcp_file: "${HOME}/.gemini/settings.json"
        skills_dir: "${HOME}/.gemini/skills"
    templates:
      config_template: "config/targets/gemini-cli/settings.json.tmpl"
      mcp_template: "config/targets/gemini-cli/settings.json.tmpl"
    override_env:
      config_file: "GEMINI_CONFIG_PATH"
      mcp_file: "GEMINI_MCP_CONFIG_PATH"
      skills_dir: "GEMINI_SKILLS_PATH"
    sync:
      mcp_mode: "merge"
      skills_mode: "overlay"
      skill_layers: ["shared", "target"]

mcp_servers:
  filesystem:
    transport: "stdio"
    enabled_targets: ["codex", "antigravity", "gemini_cli"]
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "${WORKSPACE_ROOT}"]
    env: {}
    timeout_ms: 20000

skill_sets:
  shared:
    - "skills/shared/*"
  codex:
    - "skills/codex/*"
  antigravity:
    - "skills/antigravity/*"
  gemini_cli:
    - "skills/gemini/*"
