apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-config-provider
  namespace: "424287527578"
  labels:
    cloud.googleapis.com/location: asia-northeast1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: "true"
    run.googleapis.com/maxScale: "1"
spec:
  template:
    metadata:
      labels:
        run.googleapis.com/startupProbeType: Default
      annotations:
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 5
      timeoutSeconds: 900
      serviceAccountName: open-webui-runner@sbi-art-auction.iam.gserviceaccount.com
      containers:
      - name: ai-config-provider-1
        image: asia-northeast1-docker.pkg.dev/sbi-art-auction/ghcr/ai-config-provider:main
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: AI_CONFIG_PROVIDER_DIR
          value: /app/provider-bundle
        - name: AI_CONFIG_SELECTOR_BASE_URL
          value: https://ai-config-selector-424287527578.asia-northeast1.run.app
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          timeoutSeconds: 5
          periodSeconds: 30
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
        startupProbe:
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 24
          httpGet:
            path: /readyz
            port: 8080
  traffic:
  - percent: 100
    latestRevision: true
