apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-config-selector
  namespace: "424287527578"
  labels:
    cloud.googleapis.com/location: asia-northeast1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: "true"
    run.googleapis.com/maxScale: "1"
spec:
  template:
    metadata:
      labels:
        run.googleapis.com/startupProbeType: Default
      annotations:
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 5
      timeoutSeconds: 900
      serviceAccountName: open-webui-runner@sbi-art-auction.iam.gserviceaccount.com
      containers:
      - name: ai-config-selector-1
        image: asia-northeast1-docker.pkg.dev/sbi-art-auction/ghcr/ai-config/ai-config-selector-serving:main
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          timeoutSeconds: 240
          periodSeconds: 240
          failureThreshold: 1
          httpGet:
            path: /healthz
            port: 8080
        startupProbe:
          timeoutSeconds: 240
          periodSeconds: 240
          failureThreshold: 1
          tcpSocket:
            port: 8080
  traffic:
  - percent: 100
    latestRevision: true
