apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-config-mcpo
  namespace: "424287527578"
  labels:
    cloud.googleapis.com/location: asia-northeast1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: "true"
    run.googleapis.com/maxScale: "1"
spec:
  template:
    metadata:
      labels:
        run.googleapis.com/startupProbeType: Default
      annotations:
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 5
      timeoutSeconds: 900
      serviceAccountName: open-webui-runner@sbi-art-auction.iam.gserviceaccount.com
      containers:
      - name: ai-config-mcpo-1
        image: asia-northeast1-docker.pkg.dev/sbi-art-auction/ghcr/ghcr.io/open-webui/mcpo:latest
        command:
        - /bin/sh
        args:
        - -c
        - exec mcpo --host 0.0.0.0 --port "${PORT:-8080}" --api-key "$MCPO_API_KEY" --strict-auth --server-type "streamable-http" -- "$AI_CONFIG_SELECTOR_MCP_URL"
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: AI_CONFIG_SELECTOR_MCP_URL
          value: https://ai-config-selector-424287527578.asia-northeast1.run.app/mcp
        - name: MCPO_API_KEY
          valueFrom:
            secretKeyRef:
              key: latest
              name: MCPO_API_KEY
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
        startupProbe:
          timeoutSeconds: 5
          periodSeconds: 5
          failureThreshold: 24
          tcpSocket:
            port: 8080
  traffic:
  - percent: 100
    latestRevision: true
