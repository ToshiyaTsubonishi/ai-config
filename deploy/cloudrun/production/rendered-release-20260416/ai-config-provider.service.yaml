apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-config-provider
  namespace: "424287527578"
  labels:
    cloud.googleapis.com/location: asia-northeast1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: "true"
    run.googleapis.com/maxScale: "1"
spec:
  template:
    metadata:
      labels:
        run.googleapis.com/startupProbeType: Default
      annotations:
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
        ai-config.dev/commit-sha: "d83d588afc43773b315aa5c03dc910f5eb0342c3"
        ai-config.dev/image-ref: "ghcr.io/toshiyatsubonishi/ai-config-provider@sha256:35024d7c087142d4d2041acc317c19257856b8c3f62ca2e4b765a59f21fbcd51"
        ai-config.dev/provider-bundle-version: "2947d12daaa9-cc594a4661cc"
        ai-config.dev/provider-bundle-source-commit-sha: "2947d12daaa9e53dff72c1281e3b2be25a9b2a4a"
    spec:
      containerConcurrency: 5
      timeoutSeconds: 900
      serviceAccountName: open-webui-runner@sbi-art-auction.iam.gserviceaccount.com
      containers:
      - name: ai-config-provider-1
        image: ghcr.io/toshiyatsubonishi/ai-config-provider@sha256:35024d7c087142d4d2041acc317c19257856b8c3f62ca2e4b765a59f21fbcd51
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: AI_CONFIG_PROVIDER_DIR
          value: /app/provider-bundle
        - name: AI_CONFIG_SELECTOR_BASE_URL
          value: https://ai-config-selector-424287527578.asia-northeast1.run.app
        - name: AI_CONFIG_DEPLOY_COMMIT_SHA
          value: "d83d588afc43773b315aa5c03dc910f5eb0342c3"
        - name: AI_CONFIG_DEPLOY_IMAGE
          value: "ghcr.io/toshiyatsubonishi/ai-config-provider@sha256:35024d7c087142d4d2041acc317c19257856b8c3f62ca2e4b765a59f21fbcd51"
        - name: AI_CONFIG_PROVIDER_BUNDLE_VERSION
          value: "2947d12daaa9-cc594a4661cc"
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          timeoutSeconds: 5
          periodSeconds: 30
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
        startupProbe:
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 24
          httpGet:
            path: /readyz
            port: 8080
  traffic:
  - percent: 100
    latestRevision: true
