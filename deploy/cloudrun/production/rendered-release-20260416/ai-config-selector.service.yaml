apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-config-selector
  namespace: "424287527578"
  labels:
    cloud.googleapis.com/location: asia-northeast1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: "true"
    run.googleapis.com/maxScale: "1"
spec:
  template:
    metadata:
      labels:
        run.googleapis.com/startupProbeType: Default
      annotations:
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
        ai-config.dev/commit-sha: "2947d12daaa9e53dff72c1281e3b2be25a9b2a4a"
        ai-config.dev/image-ref: "ghcr.io/toshiyatsubonishi/ai-config-selector-serving@sha256:09b6a1bebe7dcda681f2b50a0b628ce973866aea86bbf9917506b7530548e831"
    spec:
      containerConcurrency: 5
      timeoutSeconds: 900
      serviceAccountName: open-webui-runner@sbi-art-auction.iam.gserviceaccount.com
      containers:
      - name: ai-config-selector-1
        image: ghcr.io/toshiyatsubonishi/ai-config-selector-serving@sha256:09b6a1bebe7dcda681f2b50a0b628ce973866aea86bbf9917506b7530548e831
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: AI_CONFIG_DEPLOY_COMMIT_SHA
          value: "2947d12daaa9e53dff72c1281e3b2be25a9b2a4a"
        - name: AI_CONFIG_DEPLOY_IMAGE
          value: "ghcr.io/toshiyatsubonishi/ai-config-selector-serving@sha256:09b6a1bebe7dcda681f2b50a0b628ce973866aea86bbf9917506b7530548e831"
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          timeoutSeconds: 240
          periodSeconds: 240
          failureThreshold: 1
          httpGet:
            path: /healthz
            port: 8080
        startupProbe:
          timeoutSeconds: 240
          periodSeconds: 240
          failureThreshold: 1
          tcpSocket:
            port: 8080
  traffic:
  - percent: 100
    latestRevision: true
