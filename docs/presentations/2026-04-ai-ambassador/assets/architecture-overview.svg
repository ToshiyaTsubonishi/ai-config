<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FAFD"/>
      <stop offset="100%" stop-color="#EEF4FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F3769" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F497D"/>
    </marker>
  </defs>

  <rect width="1600" height="900" rx="34" fill="url(#bg)"/>
  <text x="120" y="132" font-size="50" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">Agent から execution までの役割分離</text>
  <text x="120" y="182" font-size="24" fill="#5B6B82" font-family="Arial, sans-serif">ai-config は execution runtime の本体ではなく、candidate selection と planning artifact の control plane</text>

  <rect x="120" y="255" width="250" height="180" rx="26" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="3" filter="url(#shadow)"/>
  <text x="160" y="315" font-size="34" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">Agent</text>
  <text x="160" y="360" font-size="22" fill="#4A596F" font-family="Arial, sans-serif">自然言語の依頼を受け、</text>
  <text x="160" y="392" font-size="22" fill="#4A596F" font-family="Arial, sans-serif">まず selector で候補を探す</text>

  <rect x="455" y="220" width="300" height="250" rx="28" fill="#113B74" filter="url(#shadow)"/>
  <text x="495" y="290" font-size="40" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif">ai-config-</text>
  <text x="495" y="336" font-size="40" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif">selector</text>
  <text x="495" y="392" font-size="22" fill="#D7E9FF" font-family="Arial, sans-serif">Skill / MCP 候補を返す</text>
  <text x="495" y="424" font-size="22" fill="#D7E9FF" font-family="Arial, sans-serif">search / detail / downstream MCP bridge</text>

  <rect x="840" y="220" width="300" height="250" rx="28" fill="#268BE0" filter="url(#shadow)"/>
  <text x="880" y="296" font-size="42" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif">Approved</text>
  <text x="880" y="344" font-size="42" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif">Plan</text>
  <text x="880" y="394" font-size="22" fill="#F4FAFF" font-family="Arial, sans-serif">候補に基づく plan artifact</text>
  <text x="880" y="426" font-size="22" fill="#F4FAFF" font-family="Arial, sans-serif">validation / controlled replan</text>

  <rect x="1225" y="255" width="255" height="180" rx="26" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="3" filter="url(#shadow)"/>
  <text x="1265" y="315" font-size="34" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">dispatch</text>
  <text x="1265" y="360" font-size="22" fill="#4A596F" font-family="Arial, sans-serif">parallelism / retry /</text>
  <text x="1265" y="392" font-size="22" fill="#4A596F" font-family="Arial, sans-serif">context handoff を担当</text>

  <path d="M370 345 C 415 345, 425 345, 455 345" fill="none" stroke="#1F497D" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M755 345 C 800 345, 805 345, 840 345" fill="none" stroke="#1F497D" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M1140 345 C 1185 345, 1195 345, 1225 345" fill="none" stroke="#1F497D" stroke-width="8" marker-end="url(#arrow)"/>

  <rect x="160" y="570" width="1280" height="190" rx="28" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="3"/>
  <text x="210" y="635" font-size="30" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">この構成で得られること</text>
  <text x="210" y="690" font-size="24" fill="#4A596F" font-family="Arial, sans-serif">1. 全候補を最初から抱え込まず、必要時だけ候補を返せる</text>
  <text x="210" y="728" font-size="24" fill="#4A596F" font-family="Arial, sans-serif">2. plan と execution を分けることで、責任分界と説明責任を持ちやすい</text>
  <text x="210" y="766" font-size="24" fill="#4A596F" font-family="Arial, sans-serif">3. selector-serving を read-only surface として安全に公開しやすい</text>
</svg>
