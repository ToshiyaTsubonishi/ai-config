<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7FAFD"/>
      <stop offset="100%" stop-color="#EDF4FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#133A6C" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="34" fill="url(#bg)"/>
  <text x="110" y="118" font-size="50" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">Open WebUI から見た ai-config 接続イメージ</text>
  <text x="110" y="168" font-size="24" fill="#5B6B82" font-family="Arial, sans-serif">実画面がなくても説明できるよう、接続ポイントを UI 風に可視化</text>

  <rect x="110" y="230" width="1380" height="560" rx="26" fill="#FFFFFF" stroke="#DCE5F1" stroke-width="3" filter="url(#shadow)"/>
  <rect x="110" y="230" width="1380" height="54" rx="26" fill="#EEF3F8"/>
  <circle cx="152" cy="258" r="9" fill="#EA4335"/>
  <circle cx="182" cy="258" r="9" fill="#FBBC05"/>
  <circle cx="212" cy="258" r="9" fill="#34A853"/>
  <text x="260" y="266" font-size="20" fill="#52637A" font-family="Arial, sans-serif">Open WebUI / Tool server connection</text>

  <rect x="140" y="314" width="250" height="440" rx="18" fill="#F7FAFD"/>
  <text x="176" y="366" font-size="24" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">Workspace</text>
  <rect x="170" y="395" width="190" height="48" rx="12" fill="#113B74"/>
  <text x="195" y="426" font-size="21" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif">AI Ambassador deck</text>
  <rect x="170" y="462" width="190" height="48" rx="12" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="2"/>
  <text x="193" y="493" font-size="20" fill="#35506E" font-family="Arial, sans-serif">MCP connections</text>
  <rect x="170" y="529" width="190" height="48" rx="12" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="2"/>
  <text x="193" y="560" font-size="20" fill="#35506E" font-family="Arial, sans-serif">Notes / history</text>

  <rect x="430" y="314" width="620" height="440" rx="18" fill="#FBFDFF" stroke="#E2EAF4" stroke-width="2"/>
  <text x="470" y="366" font-size="28" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">Assistant</text>
  <rect x="470" y="404" width="540" height="162" rx="18" fill="#F1F7FE"/>
  <text x="500" y="450" font-size="24" font-weight="700" fill="#113B74" font-family="Arial, sans-serif">この依頼に使うべき Skill / MCP を先に探してください</text>
  <text x="500" y="494" font-size="22" fill="#40546D" font-family="Arial, sans-serif">1. search_tools で候補探索</text>
  <text x="500" y="526" font-size="22" fill="#40546D" font-family="Arial, sans-serif">2. get_tool_detail で実行手順を確認</text>
  <text x="500" y="558" font-size="22" fill="#40546D" font-family="Arial, sans-serif">3. 必要なら downstream MCP tool list も確認</text>

  <rect x="470" y="606" width="540" height="108" rx="18" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="2"/>
  <text x="498" y="652" font-size="21" fill="#5B6B82" font-family="Courier New, monospace">Prompt:</text>
  <text x="590" y="652" font-size="21" fill="#13233A" font-family="Courier New, monospace">この依頼に使うべき Skill / MCP を先に探して...</text>
  <text x="498" y="686" font-size="19" fill="#7A889B" font-family="Arial, sans-serif">Open WebUI から自然言語で起点をつくり、ai-config 側で選定を整理する。</text>

  <rect x="1085" y="314" width="365" height="440" rx="18" fill="#F8FBFF" stroke="#E1EAF5" stroke-width="2"/>
  <text x="1120" y="366" font-size="28" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">Tool Servers</text>
  <rect x="1118" y="406" width="300" height="136" rx="20" fill="#113B74" filter="url(#shadow)"/>
  <text x="1146" y="452" font-size="24" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif">ai-config (MCPO)</text>
  <text x="1146" y="488" font-size="20" fill="#DDEBFF" font-family="Arial, sans-serif">type: OpenAPI via MCPO</text>
  <text x="1146" y="518" font-size="20" fill="#DDEBFF" font-family="Arial, sans-serif">endpoint: /mcp → /openapi.json</text>
  <circle cx="1386" cy="442" r="11" fill="#34A853"/>
  <text x="1118" y="584" font-size="21" fill="#41556E" font-family="Arial, sans-serif">接続の意味</text>
  <text x="1118" y="620" font-size="20" fill="#5B6B82" font-family="Arial, sans-serif">・既存 UI から ai-config を使える</text>
  <text x="1118" y="652" font-size="20" fill="#5B6B82" font-family="Arial, sans-serif">・CLI だけの実験に閉じない</text>
  <text x="1118" y="684" font-size="20" fill="#5B6B82" font-family="Arial, sans-serif">・運用デモの入口として見せやすい</text>

  <rect x="1120" y="720" width="286" height="18" rx="9" fill="#D7E9FF"/>
  <rect x="1120" y="720" width="206" height="18" rx="9" fill="#268BE0"/>
</svg>
