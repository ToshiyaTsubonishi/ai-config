<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFE"/>
      <stop offset="100%" stop-color="#EEF4FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#133A6C" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="34" fill="url(#bg)"/>
  <text x="110" y="118" font-size="50" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">ライブデモが不安定でも示せる証跡</text>
  <text x="110" y="168" font-size="24" fill="#5B6B82" font-family="Arial, sans-serif">公開面、ローカル readiness、repo 内テンプレートの 3 点で話を成立させる</text>

  <rect x="110" y="240" width="430" height="260" rx="24" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="3" filter="url(#shadow)"/>
  <text x="146" y="292" font-size="28" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">healthz / readyz</text>
  <rect x="146" y="326" width="360" height="142" rx="18" fill="#0F1C2F"/>
  <text x="168" y="364" font-size="21" fill="#7CE0A2" font-family="Courier New, monospace">$ curl http://127.0.0.1:8091/healthz</text>
  <text x="168" y="398" font-size="21" fill="#DCE8F7" font-family="Courier New, monospace">{"status":"ok"}</text>
  <text x="168" y="438" font-size="21" fill="#7CE0A2" font-family="Courier New, monospace">$ curl http://127.0.0.1:8091/readyz</text>
  <text x="168" y="472" font-size="20" fill="#DCE8F7" font-family="Courier New, monospace">status=ready / runtime_mode=read_only / record_count=2177</text>

  <rect x="585" y="240" width="430" height="260" rx="24" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="3" filter="url(#shadow)"/>
  <text x="621" y="292" font-size="28" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">repo にある接続テンプレート</text>
  <text x="621" y="352" font-size="22" fill="#4A596F" font-family="Courier New, monospace">deploy/cloudrun/ai-config-selector.service.yaml</text>
  <text x="621" y="392" font-size="22" fill="#4A596F" font-family="Courier New, monospace">deploy/cloudrun/ai-config-mcpo.service.yaml</text>
  <text x="621" y="432" font-size="22" fill="#4A596F" font-family="Courier New, monospace">deploy/cloudrun/open-webui.service.mcpo.yaml</text>
  <text x="621" y="472" font-size="22" fill="#4A596F" font-family="Courier New, monospace">deploy/cloudrun/open-webui.tool-server-connections.example.json</text>

  <rect x="1060" y="240" width="430" height="260" rx="24" fill="#113B74" filter="url(#shadow)"/>
  <text x="1096" y="292" font-size="28" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif">ローカル検索結果</text>
  <text x="1096" y="350" font-size="22" fill="#DCE8F7" font-family="Arial, sans-serif">`ai-config-agent search "open webui mcp"` で</text>
  <text x="1096" y="384" font-size="22" fill="#DCE8F7" font-family="Arial, sans-serif">MCP candidate が返るところまで確認済み。</text>
  <text x="1096" y="430" font-size="22" fill="#DCE8F7" font-family="Arial, sans-serif">schema approved-plan の確認も済んでおり、</text>
  <text x="1096" y="464" font-size="22" fill="#DCE8F7" font-family="Arial, sans-serif">planning artifact の説明材料が揃っている。</text>

  <rect x="110" y="560" width="1380" height="218" rx="24" fill="#FFFFFF" stroke="#D7E1EE" stroke-width="3"/>
  <text x="150" y="624" font-size="30" font-weight="700" fill="#13233A" font-family="Arial, sans-serif">発表での言い換え</text>
  <text x="150" y="676" font-size="24" fill="#4A596F" font-family="Arial, sans-serif">「今日は UI の派手さよりも、必要な道具を必要なタイミングで探して使える構成を見せたい」</text>
  <text x="150" y="714" font-size="24" fill="#4A596F" font-family="Arial, sans-serif">「ライブ実演が難しい場合でも、公開面・テンプレート・ローカル検証の 3 点で実装の進捗は示せる」</text>
</svg>
